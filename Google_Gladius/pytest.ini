[pytest]
# Pytest configuration for Multi-Agent Claude CLI Pipeline

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimal verbosity by default
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for organizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests for full pipeline
    slow: Tests that take longer to run
    requires_claude: Tests that require Claude CLI to be available

# Coverage settings (when using pytest-cov)
# Uncomment these lines after installing pytest-cov
# [coverage:run]
# source = src
# omit =
#     tests/*
#     **/__init__.py
#
# [coverage:report]
# precision = 2
# show_missing = True
# skip_covered = False
